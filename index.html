<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Referral Worklist — Business Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#EDF1F3; --surface:#FFFFFF; --surface-2:#F7F9FA;
  --ink:#0E2029; --ink-2:#415967; --ink-3:#7B929E;
  --line:#D8E1E6; --line-2:#EAF0F3;
  --brand:#0E5A6B; --brand-2:#12798E; --brand-soft:#E1EFF2;
  --s-new:#6B7A8F; --s-review:#B4761A; --s-mr:#2A63A8; --s-done:#1C7A56; --s-acc:#6B3FA0;
  --danger:#B3352F;
  --r:10px; --shadow:0 1px 2px rgba(14,32,41,.06), 0 6px 20px rgba(14,32,41,.05);
  --font-ar:"IBM Plex Sans Arabic",system-ui,sans-serif;
  --font-en:"IBM Plex Sans",system-ui,sans-serif;
  --mono:"IBM Plex Mono",ui-monospace,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--font-ar);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
body[dir=ltr]{font-family:var(--font-en)}
.mono{font-family:var(--mono);font-feature-settings:"tnum";letter-spacing:-.2px}
button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
input,select{font:inherit;color:inherit}
:focus-visible{outline:2px solid var(--brand-2);outline-offset:2px;border-radius:4px}

/* ---------- top bar ---------- */
.topbar{background:var(--brand);color:#fff;position:sticky;top:0;z-index:40}
.topbar-in{max-width:1320px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;margin-inline-end:auto}
.brand .mark{width:30px;height:30px;border:1.5px solid rgba(255,255,255,.6);border-radius:7px;display:grid;place-items:center;font-family:var(--mono);font-size:12px;font-weight:600}
.brand h1{font-size:15px;font-weight:600;margin:0;letter-spacing:.1px}
.brand span{display:block;font-size:11px;opacity:.7;font-weight:400}
.ctrl{display:flex;align-items:center;gap:8px}
.ctrl label{font-size:11px;opacity:.75}
select.dark{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:7px;padding:6px 10px;font-size:12.5px}
select.dark option{color:#0E2029}
.lang{border:1px solid rgba(255,255,255,.3);border-radius:7px;padding:6px 12px;font-size:12px;font-weight:600;letter-spacing:.3px}
.lang:hover{background:rgba(255,255,255,.12)}
.whoami{display:flex;flex-direction:column;line-height:1.25;font-size:11.5px;opacity:.85;border-inline-start:1px solid rgba(255,255,255,.22);padding-inline-start:14px}
.whoami b{font-size:12.5px;font-weight:600;opacity:1}

/* ---------- layout ---------- */
.wrap{max-width:1320px;margin:0 auto;padding:18px 20px 60px}
.rowhead{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.rowhead h2{margin:0;font-size:19px;font-weight:600}
.rowhead p{margin:2px 0 0;font-size:12.5px;color:var(--ink-3)}
.btn{background:var(--brand);color:#fff;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:7px}
.btn:hover{background:var(--brand-2)}
.btn.ghost{background:var(--surface);color:var(--brand);border:1px solid var(--line)}
.btn.ghost:hover{background:var(--brand-soft)}
.btn.sm{padding:6px 12px;font-size:12.5px}
.btn[disabled]{opacity:.4;cursor:not-allowed}
.btn.ghost.danger{color:var(--danger);border-color:#EBCFCD}
.btn.ghost.danger:hover{background:#FBEAE9}
.btn.solid-danger{background:var(--danger);color:#fff}
.btn.solid-danger:hover{background:#96271F}
.tag-opt{font-size:10.5px;color:var(--ink-3);background:var(--surface-2);border:1px solid var(--line);padding:2px 7px;border-radius:5px;font-weight:500}

/* ---------- status rail (signature) ---------- */
.counters{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:14px}
.cnt{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:10px 12px;text-align:start;position:relative;overflow:hidden}
.cnt:hover{border-color:var(--brand-2)}
.cnt.on{border-color:var(--brand);box-shadow:inset 0 0 0 1px var(--brand)}
.cnt .spine{position:absolute;inset-inline-start:0;top:0;bottom:0;width:3px;background:var(--c,#ccc)}
.cnt .n{font-family:var(--mono);font-size:22px;font-weight:600;line-height:1.1}
.cnt .l{font-size:11.5px;color:var(--ink-2);margin-top:1px}
.cnt .step{font-family:var(--mono);font-size:10px;color:var(--ink-3)}

/* ---------- filters ---------- */
.filters{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:12px;display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:10px;margin-bottom:16px;align-items:end}
.f label{display:block;font-size:11px;color:var(--ink-3);margin-bottom:4px;font-weight:500}
.f input,.f select{width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px}
.f input:focus,.f select:focus{background:#fff;border-color:var(--brand-2)}

/* ---------- cards ---------- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);position:relative;overflow:hidden;display:flex;flex-direction:column}
.card .spine{position:absolute;inset-inline-start:0;top:0;bottom:0;width:3px;background:var(--c)}
.card-top{padding:12px 14px 10px;padding-inline-start:17px;border-bottom:1px dashed var(--line-2)}
.crow{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.clinic{font-size:14px;font-weight:600;line-height:1.35}
.ccode{font-family:var(--mono);font-size:11px;color:var(--ink-3);margin-top:1px}
.pill{font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:999px;white-space:nowrap;background:var(--cbg);color:var(--c);border:1px solid var(--c)}
.refno{font-family:var(--mono);font-size:10.5px;color:var(--ink-3);margin-top:8px;display:flex;gap:10px;flex-wrap:wrap}
.card-body{padding:11px 14px;padding-inline-start:17px;display:grid;grid-template-columns:1fr 1fr;gap:8px 10px}
.kv .k{font-size:10.5px;color:var(--ink-3)}
.kv .v{font-size:13px;font-weight:500;margin-top:1px}
.kv.wide{grid-column:1/-1}
/* rail */
.rail{padding:10px 14px 0;padding-inline-start:17px}
.rail .track{display:flex;gap:3px}
.rail .seg{height:4px;flex:1;border-radius:2px;background:var(--line)}
.rail .seg.on{background:var(--c)}
.rail .cap{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9.5px;color:var(--ink-3);margin-top:5px}
.card-foot{margin-top:auto;padding:11px 14px;padding-inline-start:17px;display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid var(--line-2);background:var(--surface-2)}
.badge-flag{font-size:10.5px;font-weight:600;color:var(--s-review);background:#FBF1E0;border:1px solid #EBD7B0;padding:2px 7px;border-radius:5px}
.badge-miss{font-size:10.5px;font-weight:600;color:var(--danger);background:#FBEAE9;border:1px solid #F0C9C7;padding:2px 7px;border-radius:5px}
.empty{background:var(--surface);border:1px dashed var(--line);border-radius:var(--r);padding:44px 20px;text-align:center;color:var(--ink-3)}
.empty b{display:block;color:var(--ink);font-size:15px;margin-bottom:4px}

/* ---------- modal ---------- */
.scrim{position:fixed;inset:0;background:rgba(14,32,41,.45);backdrop-filter:blur(2px);z-index:60;display:grid;place-items:center;padding:20px}
.modal{background:var(--surface);border-radius:14px;width:min(880px,100%);max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 60px rgba(14,32,41,.3)}
.modal header{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
.modal header h3{margin:0;font-size:16px;font-weight:600}
.modal header .sub{font-family:var(--mono);font-size:11px;color:var(--ink-3)}
.x{margin-inline-start:auto;width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--ink-3);font-size:18px}
.x:hover{background:var(--surface-2);color:var(--ink)}
.modal .body{padding:16px 18px;overflow:auto}
.modal footer{padding:12px 18px;border-top:1px solid var(--line);display:flex;gap:8px;flex-wrap:wrap;background:var(--surface-2)}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);padding:0 18px;background:var(--surface)}
.tab{padding:10px 14px;font-size:13px;font-weight:500;color:var(--ink-3);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.on{color:var(--brand);border-bottom-color:var(--brand);font-weight:600}
.sect{margin-bottom:18px}
.sect h4{margin:0 0 8px;font-size:11px;font-weight:600;color:var(--ink-3);letter-spacing:.4px;text-transform:uppercase}
.dl{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px 14px}
.dl .k{font-size:10.5px;color:var(--ink-3)}
.dl .v{font-size:13.5px;font-weight:500}
/* docs */
.doc{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--line);border-radius:9px;margin-bottom:7px;background:var(--surface-2)}
.doc .ic{width:28px;height:28px;border-radius:7px;display:grid;place-items:center;font-family:var(--mono);font-size:9.5px;font-weight:600;background:#fff;border:1px solid var(--line);color:var(--ink-2)}
.doc .nm{font-size:13px;font-weight:500}
.doc .mt{font-family:var(--mono);font-size:10.5px;color:var(--ink-3)}
.doc .st{margin-inline-start:auto;display:flex;align-items:center;gap:8px}
.tag-ok{font-size:10.5px;color:var(--s-done);background:#E5F3ED;border:1px solid #BFE0D3;padding:2px 7px;border-radius:5px;font-weight:600}
.tag-no{font-size:10.5px;color:var(--danger);background:#FBEAE9;border:1px solid #F0C9C7;padding:2px 7px;border-radius:5px;font-weight:600}
.viewer{background:#0E2029;color:#93AEBB;border-radius:9px;padding:26px;text-align:center;font-family:var(--mono);font-size:12px;margin-top:8px}
/* timeline */
.tl{position:relative;padding-inline-start:22px}
.tl::before{content:"";position:absolute;inset-inline-start:5px;top:6px;bottom:6px;width:1px;background:var(--line)}
.tl .ev{position:relative;padding-bottom:16px}
.tl .ev .dot{position:absolute;inset-inline-start:-22px;top:3px;width:11px;height:11px;border-radius:50%;background:#fff;border:2.5px solid var(--c)}
.tl .ev .t{font-size:13.5px;font-weight:600}
.tl .ev .m{font-family:var(--mono);font-size:11px;color:var(--ink-3);margin-top:2px}
.tl .ev .n{font-size:12px;color:var(--ink-2);margin-top:3px}
/* form */
.fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:11px}
.fld label{display:block;font-size:11px;color:var(--ink-2);margin-bottom:4px;font-weight:500}
.fld label i{color:var(--danger);font-style:normal}
.fld input,.fld select{width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px}
.fld input:focus,.fld select:focus{background:#fff;border-color:var(--brand-2)}
.upl{border:1.5px dashed var(--line);border-radius:9px;padding:11px;display:flex;align-items:center;gap:10px;margin-bottom:7px;background:var(--surface-2)}
.upl.done{border-style:solid;border-color:#BFE0D3;background:#F2FAF6}
.note{background:var(--brand-soft);border:1px solid #C3DDE2;border-radius:9px;padding:10px 12px;font-size:12.5px;color:#0B4653;display:flex;gap:9px;align-items:flex-start}
.note.warn{background:#FBF1E0;border-color:#EBD7B0;color:#7A4E08}
/* HIS mock */
.his{background:#0E2029;border-radius:11px;padding:14px;margin-bottom:14px}
.his .bar{display:flex;align-items:center;gap:8px;color:#8FB0BD;font-family:var(--mono);font-size:11px;margin-bottom:11px}
.his .bar span{width:9px;height:9px;border-radius:50%;background:#2C4756}
.his .screen{background:#fff;border-radius:7px;padding:14px}
.toast{position:fixed;inset-block-end:22px;inset-inline-start:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:9px;font-size:13px;z-index:90;box-shadow:0 10px 30px rgba(0,0,0,.25)}
body[dir=rtl] .toast{transform:translateX(50%)}

/* ---------- guide ---------- */
.modal.wide{width:min(1000px,100%)}
.toc{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--line)}
.toc button{font-size:11.5px;padding:5px 11px;border:1px solid var(--line);border-radius:999px;color:var(--ink-2);background:var(--surface-2)}
.toc button:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-soft)}
.guide{font-size:13.5px;line-height:1.75;color:var(--ink-2)}
.guide section{margin-bottom:26px;scroll-margin-top:8px}
.guide h5{margin:0 0 4px;font-size:16px;font-weight:600;color:var(--ink);display:flex;align-items:baseline;gap:9px}
.guide h5 em{font-family:var(--mono);font-style:normal;font-size:11px;color:var(--brand-2);border:1px solid var(--brand-soft);background:var(--brand-soft);border-radius:5px;padding:1px 6px}
.guide p{margin:0 0 9px}
.guide ul,.guide ol{margin:0 0 9px;padding-inline-start:20px}
.guide li{margin-bottom:5px}
.guide b{color:var(--ink);font-weight:600}
.guide code{font-family:var(--mono);font-size:12px;background:var(--surface-2);border:1px solid var(--line);border-radius:4px;padding:1px 5px}
.gt{width:100%;border-collapse:collapse;margin:4px 0 10px;font-size:12.5px}
.gt th{text-align:start;background:var(--surface-2);color:var(--ink);font-weight:600;font-size:11.5px;padding:8px 10px;border:1px solid var(--line)}
.gt td{padding:8px 10px;border:1px solid var(--line);vertical-align:top}
.gt tr:nth-child(even) td{background:#FCFDFD}
.chip{display:inline-block;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:999px;border:1px solid var(--c);color:var(--c);background:var(--cbg);white-space:nowrap}
.callout{border-inline-start:3px solid var(--brand);background:var(--brand-soft);border-radius:0 9px 9px 0;padding:10px 13px;margin:0 0 10px;color:#0B4653}
body[dir=rtl] .callout{border-radius:9px 0 0 9px}
.callout.warn{border-color:var(--s-review);background:#FBF1E0;color:#7A4E08}
@media (max-width:760px){
  .filters{grid-template-columns:1fr}
  .card-body{grid-template-columns:1fr 1fr}
}
@media (prefers-reduced-motion:no-preference){
  .card{transition:border-color .15s, box-shadow .15s}
  .card:hover{border-color:#B9CCD4;box-shadow:0 2px 4px rgba(14,32,41,.07),0 10px 28px rgba(14,32,41,.08)}
}
</style>

<div class="topbar">
  <div class="topbar-in">
    <div class="brand">
      <div class="mark">HIS</div>
      <div>
        <h1 id="appTitle"></h1>
        <span id="appSub"></span>
      </div>
    </div>
    <div class="ctrl">
      <label id="roleLbl"></label>
      <select class="dark" id="roleSel" onchange="setRole(this.value)"></select>
    </div>
    <div class="whoami">
      <b id="userName"></b>
      <span class="mono" id="userNo"></span>
    </div>
    <button class="lang" onclick="openGuide()" id="guideBtn"></button>
    <button class="lang" onclick="toggleLang()" id="langBtn"></button>
  </div>
</div>

<div class="wrap">
  <div class="rowhead">
    <div>
      <h2 id="pageTitle"></h2>
      <p id="pageHint"></p>
    </div>
    <button class="btn" id="newBtn" onclick="openNew()">+ <span id="newBtnT"></span></button>
  </div>

  <div class="counters" id="counters"></div>

  <div class="filters">
    <div class="f"><label id="lblSearch"></label><input id="q" oninput="render()" placeholder=""></div>
    <div class="f"><label id="lblClinic"></label><select id="fClinic" onchange="render()"></select></div>
    <div class="f"><label id="lblStatus"></label><select id="fStatus" onchange="render()"></select></div>
    <div class="f"><button class="btn ghost" onclick="clearF()" id="clearBtn"></button></div>
  </div>

  <div id="list"></div>
</div>

<div id="modalHost"></div>
<div id="toastHost"></div>

const calcAge=(dob)=>{
  if(!dob) return "";
  const b=new Date(dob), d=new Date();
  let a=d.getFullYear()-b.getFullYear();
  const m=d.getMonth()-b.getMonth();
  if(m<0||(m===0&&d.getDate()<b.getDate())) a--;
  return a<0?"":a;
};
const now=()=>{const d=new Date();const p=n=>String(n).padStart(2,"0");
  return `${d.getFullYear()}‑${p(d.getMonth()+1)}‑${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;};

/* ================= render ================= */
function render(){
  const L=t(), q=document.getElementById("q").value.trim().toLowerCase();
  const fc=document.getElementById("fClinic").value, fs=document.getElementById("fStatus").value;
  const base=visible();

  // counters
  const shown=isBC()?[...STATUSES,"cancel"]:["done","acc"];
  document.getElementById("counters").innerHTML=shown.map((s,i)=>{
    const n=base.filter(r=>r.status===s).length;
    const step=s==="cancel"?"—":`${L.stepOf} ${STATUSES.indexOf(s)+1}/5`;
    return `<button class="cnt ${fs===s?"on":""}" style="--c:${SC[s].c}" onclick="document.getElementById('fStatus').value='${fs===s?"":s}';render()">
      <div class="spine"></div>
      <div class="step mono">${step}</div>
      <div class="n" style="color:${SC[s].c}">${n}</div>
      <div class="l">${L.st[s]}</div></button>`;
  }).join("");

  let rows=base.filter(r=>{
    if(fc!==""&&String(r.clinic)!==fc) return false;
    if(fs!==""&&r.status!==fs) return false;
    if(q){
      const hay=[r.nid,r.pAr,r.pEn,CLINICS[r.clinic].ar,CLINICS[r.clinic].en,CLINICS[r.clinic].code,r.ref,r.mrn||""].join(" ").toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });

  const host=document.getElementById("list");
  if(!rows.length){
    const noneAtAll = base.length===0;
    host.innerHTML=`<div class="empty"><b>${noneAtAll&&!isBC()?L.emptyDeptT:L.emptyT}</b>${noneAtAll&&!isBC()?L.emptyDeptD:L.emptyD}</div>`;
    return;
  }
  host.innerHTML=`<div class="grid">${rows.map(card).join("")}</div>`;
}

function rail(r){
  const idx=r.status==="cancel"?-1:STATUSES.indexOf(r.status);
  return `<div class="rail"><div class="track">${STATUSES.map((s,i)=>`<div class="seg ${i<=idx?"on":""}"></div>`).join("")}</div>
  <div class="cap"><span>${t().st.new}</span><span>${t().st.acc}</span></div></div>`;
}

function card(r){
  const L=t(), s=SC[r.status];
  const flags=[];
  if(r.hasPrev) flags.push(`<span class="badge-flag">${L.prevFile}</span>`);
  if(isBC()&&missingDocs(r)&&r.status!=="cancel") flags.push(`<span class="badge-miss">${L.missingDocs}</span>`);
  if(r.status==="cancel"&&r.cancelReason) flags.push(`<span class="badge-miss">${L.reasonShown}: ${r.cancelReason}</span>`);

  let actions=`<button class="btn ghost sm" onclick="openDetail('${r.id}',1)">${L.btnDocs}</button>`;
  if(isBC()){
    if(r.status==="new") actions+=`<button class="btn sm" onclick="doReview('${r.id}')">${L.btnReview}</button>`;
    if(r.status==="review") actions+=`<button class="btn sm" onclick="openFile('${r.id}')">${L.btnOpenFile}</button>`;
    if(r.status==="mr") actions+=`<button class="btn sm" onclick="doComplete('${r.id}')">${L.btnComplete}</button>`;
    if(editable(r)) actions+=`<button class="btn ghost sm" onclick="openNew('${r.id}')">${L.btnEdit}</button>
      <button class="btn ghost sm danger" onclick="openCancel('${r.id}')">${L.btnCancelRef}</button>`;
  }else if(r.status==="done"){
    actions+=`<button class="btn sm" onclick="openVisit('${r.id}')">${L.btnOpenVisit}</button>`;
  }
  actions+=`<button class="btn ghost sm" onclick="openDetail('${r.id}',0)">${L.btnDetails}</button>`;

  return `<article class="card" style="--c:${s.c};--cbg:${s.bg}">
    <div class="spine"></div>
    <div class="card-top">
      <div class="crow">
        <div><div class="clinic">${clinicName(r.clinic)}</div>
        <div class="ccode mono">${CLINICS[r.clinic].code}</div></div>
        <span class="pill">${L.st[r.status]}</span>
      </div>
      <div class="refno"><span>${r.ref}</span><span>${r.recv}</span>${r.mrn?`<span>${r.mrn}</span>`:""}</div>
    </div>
    <div class="card-body">
      <div class="kv wide"><div class="k">${L.k.patient}</div><div class="v">${r[LANG==="ar"?"pAr":"pEn"]}</div></div>
      <div class="kv"><div class="k">${L.k.nid}</div><div class="v mono">${r.nid}</div></div>
      <div class="kv"><div class="k">${L.k.age}</div><div class="v">${calcAge(r.dob)} ${L.k.yrs} · ${L.gender[r.g]}</div></div>
      <div class="kv"><div class="k">${L.k.doctor}</div><div class="v">${r[LANG==="ar"?"doctorAr":"doctorEn"]}</div></div>
      <div class="kv"><div class="k">${L.k.dept}</div><div class="v">${L.depts[r.dept]} · ${r[LANG==="ar"?"specAr":"specEn"]}</div></div>
      ${flags.length?`<div class="kv wide" style="display:flex;gap:6px;flex-wrap:wrap">${flags.join("")}</div>`:""}
    </div>
    ${rail(r)}
    <div class="card-foot">${actions}</div>
  </article>`;
}

    </div></div>

      ${dl(L.k.patient,r[LANG==="ar"?"pAr":"pEn"])}${dl(L.k.nid,r.nid,1)}
      ${dl(L.k.dob,r.dob,1)}${dl(L.k.age,calcAge(r.dob)+" "+L.k.yrs)}${dl(L.k.gender,L.gender[r.g])}
      ${dl(L.k.phone,r.phone,1)}${dl(L.k.nat,r[LANG==="ar"?"natAr":"natEn"])}
      ${dl(L.k.mrn,r.mrn||"—",1)}
    </div></div>
    <div class="sect"><h4>${L.secIns}</h4><div class="dl">
      ${dl(L.k.payer,r[LANG==="ar"?"payerAr":"payerEn"])}${dl(L.k.insCode,r.ins,1)}
    </div></div>`;
  }else if(DTAB===1){
    const rowsD=DOCLIST.map(([k,req])=>{
      const on=r.docs[k];
      return `<div class="doc"><div class="ic">PDF</div>
        <div><div class="nm">${L.docNames[k]}</div>
        <div class="mt">${req?L.req:L.opt}${on?" · 1.2 MB · 2026‑07‑16":""}</div></div>
        <div class="st">${on?`<span class="tag-ok">${L.uploaded}</span><button class="btn ghost sm" onclick="preview('${L.docNames[k]}')">${L.btnDocs}</button>`
          :`<span class="tag-${req?"no":"opt"}">${L.missing}</span>`}</div></div>`;
    }).join("");
    body=`${isBC()?`<div class="note ${missingDocs(r)?"warn":""}" style="margin-bottom:12px"><span>●</span><span>${L.docsHint}</span></div>`:""}
      ${rowsD}<div id="pv"></div>`;
  }else{
    body=`<div class="tl">${r.timeline.map(e=>`
      <div class="ev"><div class="dot" style="--c:${SC[e.st].c}"></div>
      <div class="t">${L.st[e.st]}</div>
      <div class="n">${e.st==="new"?L.tlNew:e.st==="review"?L.tlReview:e.st==="mr"?(e.upd?L.tlMrU:L.tlMr):
        e.st==="done"?L.tlDone:e.st==="cancel"?L.tlCancel:e.st==="edit"?L.tlEdit:L.tlAcc}
        ${e.reason?`<div style="margin-top:3px"><b>${L.reasonShown}:</b> ${e.reason}</div>`:""}</div>
      <div class="m">${e.when} · ${L.by} ${LANG==="ar"?e.ar:e.en} · ${L.empNo} ${e.no}</div></div>`).join("")}</div>`;
  }
  let foot="";
  if(isBC()){
    if(r.status==="new") foot=`<button class="btn" onclick="doReview('${r.id}')">${L.btnReview}</button>`;
    if(r.status==="review") foot=`<button class="btn" onclick="openFile('${r.id}')">${L.btnOpenFile}</button>`;
    if(r.status==="mr") foot=`<button class="btn" onclick="doComplete('${r.id}')">${L.btnComplete}</button>`;
    if(editable(r)) foot+=`<button class="btn ghost" onclick="openNew('${r.id}')">${L.btnEdit}</button>
      <button class="btn ghost danger" onclick="openCancel('${r.id}')">${L.btnCancelRef}</button>`;
    if(r.status==="done") foot=`<span style="font-size:12.5px;color:var(--ink-3);align-self:center">${L.lockedNote}</span>`;
  }else if(r.status==="done"){
    foot=`<button class="btn" onclick="openVisit('${r.id}')">${L.btnOpenVisit}</button>`;
  }
  document.getElementById("modalHost").innerHTML=shell(r[LANG==="ar"?"pAr":"pEn"],`${r.ref} · ${r.nid}`,body,foot,tabs);
}

/* ---- status actions (Business Center) ---- */
function doReview(id){
  const r=DATA.find(x=>x.id===id); r.status="review"; log(r,"review");
  closeModal(); render(); toast(t().tReview);
}
function doComplete(id){

function saveFile(id){

/* ---- new / edit referral (Business Center) ---- */
const NEWDOCS={form:false,report:false,letter:false,other:false};
let EDITID=null;
function openNew(editId){
  const L=t();
  EDITID=editId||null;
  const e=EDITID?DATA.find(x=>x.id===EDITID):null;
  if(e&&!editable(e)){toast(L.lockedNote);return;}
  Object.keys(NEWDOCS).forEach(k=>NEWDOCS[k]=e?!!e.docs[k]:false);
  const V={clinic:e?e.clinic:0,doc:e?e[LANG==="ar"?"doctorAr":"doctorEn"]:"",dept:e?e.dept:"opd",
    spec:e?e[LANG==="ar"?"specAr":"specEn"]:"",name:e?e[LANG==="ar"?"pAr":"pEn"]:"",nid:e?e.nid:"",
    dob:e?(e.dob||""):"",g:e?e.g:"m",ph:e?e.phone:"",nat:e?e[LANG==="ar"?"natAr":"natEn"]:(LANG==="ar"?"سعودي":"Saudi"),
    pay:e?e[LANG==="ar"?"payerAr":"payerEn"]:"",ins:e?e.ins:""};

  const body=`
   <div class="sect"><h4>${L.secRef}</h4><div class="fgrid">
     <div class="fld"><label>${L.clinic} <i>*</i></label>${sel("n_clinic",CLINICS.map((c,i)=>`<option value="${i}" ${i===V.clinic?"selected":""}>${c[LANG]} — ${c.code}</option>`).join(""))}</div>
     <div class="fld"><label>${L.k.doctor} <i>*</i></label><input id="n_doc" value="${V.doc}"></div>
     <div class="fld"><label>${L.k.dept} <i>*</i></label>${sel("n_dept",Object.keys(L.depts).map(k=>`<option value="${k}" ${k===V.dept?"selected":""}>${L.depts[k]}</option>`).join(""))}</div>
     <div class="fld"><label>${L.k.spec} <i>*</i></label><input id="n_spec" value="${V.spec}"></div>
   </div></div>
   <div class="sect"><h4>${L.secPatient}</h4><div class="fgrid">
     <div class="fld"><label>${L.k.patient} <i>*</i></label><input id="n_name" value="${V.name}"></div>
     <div class="fld"><label>${L.k.nid} <i>*</i></label><input id="n_nid" class="mono" maxlength="10" value="${V.nid}"></div>
     <div class="fld"><label>${L.k.dob} <i>*</i></label><input id="n_dob" type="date" max="${new Date().toISOString().slice(0,10)}" value="${V.dob}" oninput="syncAge()"></div>
     <div class="fld"><label>${L.k.age}</label><input id="n_age" class="mono" value="${V.dob?calcAge(V.dob)+" "+L.k.yrs:""}" placeholder="${L.dobAuto}" readonly style="background:#EEF2F4;color:var(--ink-3)"></div>
     <div class="fld"><label>${L.k.gender} <i>*</i></label>${sel("n_g",`<option value="m" ${V.g==="m"?"selected":""}>${L.gender.m}</option><option value="f" ${V.g==="f"?"selected":""}>${L.gender.f}</option>`)}</div>
     <div class="fld"><label>${L.k.phone} <i>*</i></label><input id="n_ph" class="mono" value="${V.ph}"></div>
     <div class="fld"><label>${L.k.nat} <i>*</i></label><input id="n_nat" value="${V.nat}"></div>
   </div></div>
   <div class="sect"><h4>${L.secIns}</h4><div class="fgrid">
     <div class="fld"><label>${L.k.payer} <i>*</i></label><input id="n_pay" value="${V.pay}"></div>
     <div class="fld"><label>${L.k.insCode} <i>*</i></label><input id="n_ins" class="mono" value="${V.ins}"></div>
   </div></div>
   <div class="sect"><h4>${L.tabs.docs}</h4>
     <div class="note" style="margin-bottom:10px"><span>●</span><span>${L.docsHint}</span></div>
     ${DOCLIST.map(([k,req])=>`
       <div class="upl ${NEWDOCS[k]?"done":""}" id="u_${k}">
         <div class="ic" style="width:28px;height:28px;border-radius:7px;display:grid;place-items:center;font-family:var(--mono);font-size:9.5px;background:#fff;border:1px solid var(--line)">PDF</div>
         <div><div style="font-size:13px;font-weight:500">${L.docNames[k]}</div>
         <div class="mono" style="font-size:10.5px;color:var(--ink-3)" id="s_${k}">${NEWDOCS[k]?L.uploaded+" · 1.2 MB":(req?L.req:L.opt)}</div></div>
         <div style="margin-inline-start:auto"><button class="btn ghost sm" onclick="fakeUp('${k}')">${NEWDOCS[k]?(LANG==="ar"?"استبدال":"Replace"):(LANG==="ar"?"إرفاق":"Attach")}</button></div>
       </div>`).join("")}
   </div>`;

}
function fakeUp(k){
  NEWDOCS[k]=true;
  const row=document.getElementById("u_"+k);
  row.classList.add("done");
  document.getElementById("s_"+k).textContent=t().uploaded+" · 1.2 MB";
  row.querySelector("button").textContent=LANG==="ar"?"استبدال":"Replace";
}
function syncAge(){
  const d=document.getElementById("n_dob").value;
  const a=calcAge(d);
  document.getElementById("n_age").value=a===""?"":a+" "+t().k.yrs;
}
function saveNew(){
  const L=t(), v=id=>document.getElementById(id).value.trim();
  const req=["n_doc","n_spec","n_name","n_nid","n_ph","n_nat","n_pay","n_ins"];
  for(const id of req){ if(!v(id)){ document.getElementById(id).focus(); toast(LANG==="ar"?"أكمل الحقول الإلزامية":"Complete the required fields"); return; } }
  if(!v("n_dob")){ document.getElementById("n_dob").focus(); toast(L.needDob); return; }
  const nid=v("n_nid");

  if(EDITID){                                  // تعديل تحويل قائم
    const r=DATA.find(x=>x.id===EDITID);
    Object.assign(r,{clinic:+v("n_clinic"),doctorAr:v("n_doc"),doctorEn:v("n_doc"),
      pAr:v("n_name"),pEn:v("n_name"),nid,dob:v("n_dob"),g:v("n_g"),phone:v("n_ph"),
      natAr:v("n_nat"),natEn:v("n_nat"),payerAr:v("n_pay"),payerEn:v("n_pay"),ins:v("n_ins"),
      dept:v("n_dept"),specAr:v("n_spec"),specEn:v("n_spec"),docs:{...NEWDOCS}});
    log(r,"edit"); EDITID=null;
    closeModal(); render(); toast(t().tEdited); return;
  }

  const prev=DATA.some(r=>r.nid===nid);
  const r=mk({clinic:+v("n_clinic"),doctorAr:v("n_doc"),doctorEn:v("n_doc"),
    pAr:v("n_name"),pEn:v("n_name"),nid,dob:v("n_dob"),g:v("n_g"),phone:v("n_ph"),
    natAr:v("n_nat"),natEn:v("n_nat"),payerAr:v("n_pay"),payerEn:v("n_pay"),ins:v("n_ins"),
    dept:v("n_dept"),specAr:v("n_spec"),specEn:v("n_spec"),recv:now(),status:"new",
    docs:{...NEWDOCS},hasPrev:prev});
  DATA.unshift(r); log(r,"new");
  closeModal(); render(); toast(L.tSaved);
}

   <tr><td>${chip("new")}</td><td>عند إدخال طلب التحويل في النظام</td><td>تلقائي عند الحفظ</td></tr>
   <tr><td>${chip("review")}</td><td>عند بدء مراجعة البيانات والمستندات</td><td>مركز الأعمال</td></tr>
   <tr><td>${chip("mr")}</td><td>بعد إنشاء ملف المريض أو تحديث ملفه القائم</td><td>مركز الأعمال</td></tr>
   <tr><td>${chip("done")}</td><td>بعد اكتمال كل المتطلبات — <b>هنا تظهر الحالة للأقسام</b></td><td>مركز الأعمال</td></tr>
   <tr><td>${chip("acc")}</td><td>عند حضور المريض وفتح الكشف له</td><td>العيادة / الطوارئ / التنويم</td></tr>
   <tr><td>${chip("cancel")}</td><td>عند إلغاء الطلب قبل اكتماله، مع تسجيل السبب</td><td>مركز الأعمال</td></tr>
  </table>
  <p>ترتيب المراحل مقصود: <b>فتح الملف يسبق الاعتماد</b>، لأن القسم يحتاج ملفاً موجوداً ورقم ملف طبي حتى يستطيع فتح الكشف مباشرة عند حضور المريض.</p>
  <p>يظهر شريط صغير أسفل كل بطاقة يوضح موقع الحالة من المراحل الخمس. في التحويل الملغي يظهر الشريط رمادياً بالكامل.</p>
 </section>

 <section id="g5"><h5><em>5</em> مسار مركز الأعمال — خطوة بخطوة</h5>
  <ol>
   <li><b>إدخال التحويل:</b> اضغط <code>+ تحويل جديد</code>، ثم عبّئ بيانات التحويل (الجهة المحوّلة، الطبيب، الجهة المستقبِلة، التخصص)، وبيانات المريض، وبيانات التأمين، وارفع المستندات. الحقول المعلّمة بـ <b>*</b> إلزامية، ومنها <b>تاريخ الميلاد</b> الذي لا يمكن الحفظ بدونه. الحالة تصبح ${chip("new")}.</li>
   <li><b>بدء المراجعة:</b> من البطاقة اضغط <code>بدء المراجعة</code> لتصبح الحالة ${chip("review")}، ويُسجَّل اسمك ورقمك الوظيفي في سجل التتبع.</li>
   <li><b>فتح الملف:</b> اضغط <code>فتح ملف</code> لتفتح شاشة تسجيل المريض في HIS <b>معبّأة تلقائياً</b> من بطاقة التحويل. <b>تاريخ الميلاد إلزامي هنا أيضاً</b>، ولن يُحفظ الملف بدونه. راجع البيانات واحفظ، فيصدر رقم ملف طبي (MRN) وتصبح الحالة ${chip("mr")}.</li>
   <li><b>الاعتماد:</b> اضغط <code>اعتماد كمكتمل</code>. تصبح الحالة ${chip("done")} وتظهر فوراً في لوحات الأقسام.</li>
  </ol>
  <div class="callout warn">زر الاعتماد يرفض التنفيذ في حالتين: وجود <b>مستند إلزامي ناقص</b>، أو <b>عدم فتح ملف المريض</b> بعد. ستظهر لك رسالة توضح السبب.</div>
  <div class="callout"><b>تاريخ الميلاد:</b> حقل إلزامي في موضعين — عند إدخال التحويل الجديد أو تعديله، وعند فتح ملف المريض. <b>العمر لا يُكتب يدوياً</b> بل يُحتسب تلقائياً من تاريخ الميلاد ويظهر في حقل للقراءة فقط، فيبقى صحيحاً دائماً مهما طالت مدة الحالة.</div>
 </section>

 <section id="g6"><h5><em>6</em> مسار الأقسام — العيادات والطوارئ والتنويم</h5>
  <ol>
   <li>عند اختيار أي من هذه الأدوار، تعرض اللوحة <b>الحالات المكتملة والمقبولة فقط</b>. لا تظهر الحالات الجديدة ولا قيد المراجعة ولا الملغاة.</li>
   <li>عند حضور المريض، ابحث <b>برقم الهوية</b> أو باسمه.</li>
   <li>افتح <code>المرفقات</code> أو <code>التفاصيل</code> للاطلاع على نموذج التحويل والتقارير قبل الاستقبال.</li>
   <li>اضغط <code>فتح كشف</code>، وستظهر نافذة تأكيد فيها بيانات المريض ورقم ملفه وجهة التأمين. بعد التأكيد تصبح الحالة ${chip("acc")}.</li>
  </ol>
 </section>

 <section id="g7"><h5><em>7</em> المستندات</h5>
  <table class="gt"><tr><th>المستند</th><th>الحالة</th><th>الأثر</th></tr>
   <tr><td>نموذج التحويل</td><td><b>إلزامي</b></td><td>يمنع اعتماد الحالة إذا كان ناقصاً</td></tr>
   <tr><td>التقرير الطبي</td><td><b>إلزامي</b></td><td>يمنع اعتماد الحالة إذا كان ناقصاً</td></tr>
   <tr><td>خطاب العلاج / الخطة العلاجية</td><td>اختياري</td><td>لا يمنع الاعتماد ولا يُظهر أي تنبيه</td></tr>
   <tr><td>مستندات داعمة أخرى</td><td>اختياري</td><td>لا يمنع الاعتماد ولا يُظهر أي تنبيه</td></tr>
  </table>
  <p>في تبويب <b>المرفقات</b> يظهر أمام كل مستند وسم: <b>مرفوع</b> (أخضر)، أو <b>غير مرفوع</b> بالأحمر للإلزامي وبالرمادي المحايد للاختياري. أي بطاقة ينقصها مستند إلزامي تحمل وسم <b>«مستندات ناقصة»</b>، وهذا الوسم يظهر لمركز الأعمال فقط.</p>
  <p>الضغط على <code>عرض المرفقات</code> بجانب مستند مرفوع يفتح معاينة تجريبية له داخل الشاشة نفسها.</p>
 </section>

 <section id="g8"><h5><em>8</em> التعديل والإلغاء</h5>
  <p><b>التعديل:</b> متاح لمركز الأعمال في مراحل ${chip("new")} ${chip("review")} ${chip("mr")} فقط. زر <code>تعديل</code> يفتح نموذج الإدخال معبّأً بالكامل، ويمكن تصحيح البيانات أو رفع المستندات الناقصة، وتُسجَّل عملية التعديل في سجل التتبع.</p>
  <p><b>القفل بعد الاكتمال:</b> بمجرد أن تصبح الحالة ${chip("done")} وتنتقل للأقسام، يختفي زرّا التعديل والإلغاء نهائياً وتظهر رسالة توضح أن الحالة مقفلة.</p>
  <p><b>الإلغاء:</b> زر <code>إلغاء التحويل</code> يفتح نافذة فيها قائمة أسباب جاهزة وحقل نصي. <b>لا يمكن الحفظ بدون سبب.</b> بعد الإلغاء:</p>
  <ul>
   <li>تصبح الحالة ${chip("cancel")} ولها عدّاد وفلتر مستقلان.</li>
   <li>يظهر سبب الإلغاء على البطاقة وداخل سجل التتبع مع اسم الموظف ورقمه الوظيفي والوقت.</li>
   <li>لا تظهر الحالة للأقسام إطلاقاً، وتبقى عند مركز الأعمال للتتبع والإحصاء.</li>
  </ul>
 </section>

 <section id="g9"><h5><em>9</em> البحث والتصفية والعدّادات</h5>
  <ul>
   <li><b>حقل البحث</b> يبحث في: رقم الهوية، اسم المريض، اسم العيادة أو المركز، كود الجهة المحوّلة، رقم التحويل، ورقم الملف الطبي.</li>
   <li><b>قائمة العيادة</b> لتصفية الحالات حسب الجهة المحوّلة.</li>
   <li><b>قائمة الحالة</b> لتصفية الحالات حسب المرحلة.</li>
   <li><b>بطاقات العدّادات</b> أعلى الشاشة تعرض عدد الحالات في كل مرحلة، والضغط على أي عدّاد يطبّق تصفيته مباشرة، والضغط عليه مرة أخرى يلغيها.</li>
   <li><code>مسح التصفية</code> يعيد العرض إلى كل الحالات.</li>
  </ul>
 </section>

 <section id="g10"><h5><em>10</em> بطاقة الحالة</h5>
  <p>كل تحويل يظهر كبطاقة مستقلة تحتوي على:</p>
  <ul>
   <li>اسم العيادة أو المركز المحوّل وكوده.</li>
   <li>رقم التحويل، تاريخ ووقت الاستلام، ورقم الملف الطبي بعد إصداره.</li>
   <li>اسم المريض، رقم الهوية، والعمر المحتسب من تاريخ الميلاد مع الجنس (وتاريخ الميلاد نفسه يظهر في تبويب التفاصيل).</li>
   <li>اسم الطبيب المعالج، والجهة المستقبِلة مع التخصص.</li>
   <li>وسم المرحلة الحالية بلون مميز، وشريط تقدّم يوضح موقعها من المراحل الخمس.</li>
   <li>أزرار الإجراءات المتاحة لدورك الحالي فقط.</li>
  </ul>
  <p>تبويب <b>تفاصيل</b> يعرض باقي البيانات: الجوال، الجنسية، الجهة الدافعة، وكود التأمين.</p>
 </section>

 <section id="g11"><h5><em>11</em> سجل التتبع</h5>
  <p>داخل كل بطاقة تبويب <b>سجل التتبع</b> يعرض تاريخ الحالة كاملاً بترتيب زمني. كل حدث يسجّل: <b>المرحلة</b>، <b>وصف الإجراء</b>، <b>اسم الموظف</b>، <b>الرقم الوظيفي</b>، و<b>التاريخ والوقت</b>. تُسجَّل أيضاً عمليات التعديل والإلغاء مع السبب، مما يتيح تتبع كل حالة من لحظة استلام التحويل حتى فتح الكشف.</p>
 </section>

 <section id="g12"><h5><em>12</em> المريض صاحب ملف سابق</h5>
  <p>إذا كان رقم الهوية مسجلاً مسبقاً، تحمل البطاقة وسم <b>«ملف سابق موجود»</b>. عند الضغط على <code>فتح ملف</code> يتغير عنوان الشاشة إلى <b>تحديث ملف المريض</b>، ولا يُنشأ ملف جديد، بل تُحدَّث بياناته وكود التأمين على الملف القائم. ويُسجَّل ذلك في سجل التتبع كتحديث لا كإنشاء.</p>
  <p>لتجربتها: حالة <b>سعد فهد الشمري</b> معلّمة بملف سابق.</p>
 </section>

 <section id="g13"><h5><em>13</em> حدود المحاكي</h5>
  <ul>
   <li>جميع البيانات والأسماء والأرقام <b>وهمية</b> لأغراض العرض.</li>
   <li>لا يوجد ربط فعلي مع HIS؛ شاشة تسجيل المريض تمثيلية، وأرقام الملفات تُولَّد عشوائياً.</li>
   <li>رفع المستندات محاكاة فقط، ولا تُرفع ملفات حقيقية، والمعاينة تمثيلية.</li>
   <li>لا يوجد تسجيل دخول؛ تبديل الدور يدوي لغرض العرض فقط.</li>
   <li><b>أي تغييرات تجريها تُفقد عند إعادة تحميل الصفحة</b> وتعود البيانات لحالتها الأصلية.</li>
  </ul>
 </section>
 </div>`,

 en:()=>`
 <div class="toc">
   ${[["g1","Overview"],["g2","Getting started"],["g3","Roles"],["g4","Referral stages"],
      ["g5","Business Center flow"],["g6","Department flow"],["g7","Documents"],["g8","Edit & cancel"],
      ["g9","Search & filters"],["g10","The case card"],["g11","Audit trail"],["g12","Existing files"],
      ["g13","Prototype limits"]].map(([id,n])=>`<button onclick="jump('${id}')">${n}</button>`).join("")}
 </div>
 <div class="guide">

 <section id="g1"><h5><em>1</em> Overview</h5>
  <p>This is a working prototype of the referral worklist inside the <b>HIS</b>. It replaces email-based referral intake with a single electronic path that starts when a contracted provider sends a referral and ends when the patient arrives and a visit is opened.</p>
  <p>The prototype demonstrates three things: <b>what the screens look like</b>, <b>the order of steps</b>, and <b>what each role may do</b>. All data shown is fictional and for demonstration only.</p>
 </section>

 <section id="g2"><h5><em>2</em> Getting started</h5>
  <ol>
   <li>In the top bar, pick the <b>role</b> you want to try: Business Center, Outpatient Clinics, Emergency, or Admission Office. The screen and permissions change immediately.</li>
   <li>Next to the role you'll see the <b>user name and employee number</b> — every action is recorded in the audit trail under that user.</li>
   <li>The <code>عربي</code> button switches the interface between English and Arabic, including full page direction.</li>
   <li>Start as the <b>Business Center</b>, create a referral and take it through the full path, then switch to a department role to see how the case appears to them.</li>
  </ol>
 </section>

 <section id="g3"><h5><em>3</em> Roles and permissions</h5>
  <table class="gt"><tr><th>Action</th><th>Business Center</th><th>Clinics / ER / Admission</th></tr>
   <tr><td>Create a referral</td><td>Yes</td><td>No</td></tr>
   <tr><td>Upload documents</td><td>Yes</td><td>No</td></tr>
   <tr><td>Review data and documents</td><td>Yes</td><td>No</td></tr>
   <tr><td>Create the patient file in HIS</td><td>Yes</td><td>No</td></tr>
   <tr><td>Mark the case complete</td><td>Yes</td><td>No</td></tr>
   <tr><td>Edit or cancel a referral</td><td>Yes (before completion)</td><td>No</td></tr>
   <tr><td>View completed cases and attachments</td><td>Yes</td><td>Yes</td></tr>
   <tr><td>Open a visit on patient arrival</td><td>No</td><td>Yes</td></tr>
  </table>
  <div class="callout">Outpatient clinics, the emergency department and the admission office share <b>exactly the same permissions</b>: view completed cases and open a visit. They take no part in review and change no earlier stage.</div>
 </section>

 <section id="g4"><h5><em>4</em> Referral stages</h5>
  <table class="gt"><tr><th>Stage</th><th>Recorded when</th><th>Set by</th></tr>
   <tr><td>${chip("new")}</td><td>The referral is entered into the system</td><td>Automatic on save</td></tr>
   <tr><td>${chip("review")}</td><td>Review of data and documents begins</td><td>Business Center</td></tr>
   <tr><td>${chip("mr")}</td><td>The patient file is created or an existing one updated</td><td>Business Center</td></tr>
   <tr><td>${chip("done")}</td><td>All requirements are met — <b>the case now appears to departments</b></td><td>Business Center</td></tr>
   <tr><td>${chip("acc")}</td><td>The patient arrives and a visit is opened</td><td>Clinic / ER / Admission</td></tr>
   <tr><td>${chip("cancel")}</td><td>The referral is cancelled before completion, with a recorded reason</td><td>Business Center</td></tr>
  </table>
  <p>The order is deliberate: <b>the file is created before completion</b>, because the department needs an existing file and an MRN to open a visit the moment the patient arrives.</p>
  <p>A small track at the bottom of each card shows where the case sits among the five stages. For a cancelled referral the track stays fully grey.</p>
 </section>

 <section id="g5"><h5><em>5</em> Business Center flow — step by step</h5>
  <ol>
   <li><b>Enter the referral:</b> click <code>+ New referral</code>, then fill in referral details (referring provider, doctor, receiving unit, specialty), patient details, insurance details, and upload the documents. Fields marked <b>*</b> are required — including <b>date of birth</b>, without which nothing can be saved. The case becomes ${chip("new")}.</li>
   <li><b>Start review:</b> click <code>Start review</code> on the card. The case moves to ${chip("review")} and your name and employee number are written to the audit trail.</li>
   <li><b>Create the file:</b> click <code>Open file</code> to launch the HIS registration screen, <b>pre-filled</b> from the referral card. <b>Date of birth is required here too</b> — the file will not save without it. Review and save; an MRN is issued and the case becomes ${chip("mr")}.</li>
   <li><b>Complete:</b> click <code>Mark complete</code>. The case becomes ${chip("done")} and appears instantly on the department worklists.</li>
  </ol>
  <div class="callout warn">Completion is blocked in two situations: a <b>required document is missing</b>, or the <b>patient file has not been created</b> yet. A message explains which one applies.</div>
  <div class="callout"><b>Date of birth</b> is mandatory in two places: when a referral is created or edited, and on the patient file screen. <b>Age is never typed manually</b> — it is calculated from the date of birth and shown in a read-only field, so it stays correct however long the case remains open.</div>
 </section>

 <section id="g6"><h5><em>6</em> Department flow — clinics, ER, admission</h5>
  <ol>
   <li>Under any of these roles the worklist shows <b>completed and accepted cases only</b>. New, under-review and cancelled cases are not visible.</li>
   <li>When the patient arrives, search by <b>national ID</b> or by name.</li>
   <li>Open <code>Attachments</code> or <code>Details</code> to check the referral form and reports before receiving the patient.</li>
   <li>Click <code>Open visit</code>. A confirmation window shows the patient details, MRN and payer. On confirmation the case becomes ${chip("acc")}.</li>
  </ol>
 </section>

 <section id="g7"><h5><em>7</em> Documents</h5>
  <table class="gt"><tr><th>Document</th><th>Status</th><th>Effect</th></tr>
   <tr><td>Referral form</td><td><b>Required</b></td><td>Blocks completion while missing</td></tr>
   <tr><td>Medical report</td><td><b>Required</b></td><td>Blocks completion while missing</td></tr>
   <tr><td>Treatment letter / plan</td><td>Optional</td><td>Never blocks completion, no warning shown</td></tr>
   <tr><td>Other supporting documents</td><td>Optional</td><td>Never blocks completion, no warning shown</td></tr>
  </table>
  <p>In the <b>Attachments</b> tab each document carries a tag: <b>Uploaded</b> in green, or <b>Not uploaded</b> — red for required documents and neutral grey for optional ones. A card missing a required document carries a <b>“Missing documents”</b> tag, visible to the Business Center only.</p>
  <p>Clicking <code>Attachments</code> next to an uploaded document opens a mock preview in place.</p>
 </section>

 <section id="g8"><h5><em>8</em> Editing and cancelling</h5>
  <p><b>Editing</b> is available to the Business Center at stages ${chip("new")} ${chip("review")} ${chip("mr")} only. The <code>Edit</code> button reopens the entry form fully pre-filled, so details can be corrected or missing documents uploaded. The edit is written to the audit trail.</p>
  <p><b>Locked after completion:</b> once the case is ${chip("done")} and released to departments, both buttons disappear and a message states that the case is locked.</p>
  <p><b>Cancelling:</b> <code>Cancel referral</code> opens a window with a list of common reasons plus a free-text field. <b>Nothing is saved without a reason.</b> After cancelling:</p>
  <ul>
   <li>The case becomes ${chip("cancel")} with its own counter and filter.</li>
   <li>The reason appears on the card and in the audit trail with the employee name, number and timestamp.</li>
   <li>The case is never shown to departments; it stays with the Business Center for tracking and reporting.</li>
  </ul>
 </section>

 <section id="g9"><h5><em>9</em> Search, filters and counters</h5>
  <ul>
   <li><b>The search field</b> covers: national ID, patient name, clinic or center name, provider code, referral number and MRN.</li>
   <li><b>The clinic list</b> filters cases by referring provider.</li>
   <li><b>The status list</b> filters cases by stage.</li>
   <li><b>The counter cards</b> at the top show how many cases sit at each stage; clicking one applies its filter and clicking it again clears it.</li>
   <li><code>Clear filters</code> returns the view to all cases.</li>
  </ul>
 </section>

 <section id="g10"><h5><em>10</em> The case card</h5>
  <p>Every referral appears as its own card showing:</p>
  <ul>
   <li>The referring clinic or center and its code.</li>
   <li>The referral number, date and time received, and the MRN once issued.</li>
   <li>Patient name, national ID, gender, and the age calculated from the date of birth (the date itself appears in the Details tab).</li>
   <li>Treating doctor, receiving unit and specialty.</li>
   <li>A colour-coded stage tag and a progress track showing its position among the five stages.</li>
   <li>Only the action buttons your current role is allowed to use.</li>
  </ul>
  <p>The <b>Details</b> tab holds the rest: mobile number, nationality, payer and insurance code.</p>
 </section>

 <section id="g11"><h5><em>11</em> Audit trail</h5>
  <p>Each card has an <b>Audit trail</b> tab listing the full history in chronological order. Every event records the <b>stage</b>, a <b>description of the action</b>, the <b>employee name</b>, the <b>employee number</b> and the <b>date and time</b>. Edits and cancellations are logged too, including the reason, so each case can be traced from the moment the referral arrives until the visit is opened.</p>
 </section>

 <section id="g12"><h5><em>12</em> Patients with an existing file</h5>
  <p>If the national ID is already registered, the card carries an <b>“Existing file found”</b> tag. Clicking <code>Open file</code> then opens <b>Update patient file</b> instead: no new file is created, and the details and insurance code are updated on the existing record. The audit trail records it as an update rather than a creation.</p>
  <p>To try it: the case for <b>Saad Fahad Alshammari</b> is flagged with an existing file.</p>
 </section>

 <section id="g13"><h5><em>13</em> Prototype limits</h5>
  <ul>
   <li>All names, numbers and records are <b>fictional</b> demonstration data.</li>
